[imap]
host = {{IMAP_HOST}}
user = {{IMAP_USER}}
password = {{IMAP_PASSWORD}}
ssl = True
port = 993

[mailbox]
reports_folder = {{IMAP_REPORTS_FOLDER}}
archive_folder = Archive
watch = False
delete = False
test = True
batch_size = 50

[general]
save_aggregate = True
save_forensic = True
save_smtp_tls = False
output = /config/dmarc
silent = True

[output]
directory = /config/dmarc
